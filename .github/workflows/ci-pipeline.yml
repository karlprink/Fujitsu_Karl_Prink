name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. TÖÖ: Saladuste skännimine (Security)
  secret-scanning:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. TÖÖ: Koodi kvaliteet ja testimine
  build-and-test:
    name: Lint, Build and Test
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Kontrollib, kas kood vastab Google Java Format standardile (Nagu Black --check)
      - name: Run Linter / Formatter Check (Spotless)
        run: mvn spotless:check -B

      # Ehitab rakenduse ja jooksutab testid
      - name: Run Maven Tests
        run: mvn clean test -B