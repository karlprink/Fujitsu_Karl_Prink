spring:
  datasource:
    url: jdbc:h2:mem:weatherdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

weather:
  import:
    cron: "0 15 * * * ?"
    url: "https://www.ilmateenistus.ee/ilma_andmed/xml/observations.php"