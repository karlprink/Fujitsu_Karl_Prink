spring:
  datasource:
    url: jdbc:h2:file:/app/data/weatherdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

weather:
  import:
    cron: "0 15 * * * ?"
    url: "https://www.ilmateenistus.ee/ilma_andmed/xml/observations.php"